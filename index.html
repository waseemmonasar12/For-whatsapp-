<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أبو محمد العبيدي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-gold: #c5a059;
            --dark-blue: #1a2a3a;
            --light-bg: #f4f7f6;
        }
        body { font-family: 'Cairo', sans-serif; background-color: var(--light-bg); margin: 0; padding: 0; color: var(--dark-blue); }
        header { background-color: var(--dark-blue); color: white; padding: 40px 20px; text-align: center; border-bottom: 5px solid var(--main-gold); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .logo-symbol { font-size: 60px; margin-bottom: 10px; display: block; color: var(--main-gold); }
        h1 { margin: 0; font-size: 2.2rem; }
        .container { max-width: 1100px; margin: -30px auto 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .status-badge { background: #e8f4fd; color: #2980b9; padding: 8px 20px; border-radius: 50px; display: inline-block; margin-bottom: 25px; font-size: 0.9rem; border: 1px solid #d1e9f9; }
        .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .book-card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 25px; text-align: center; transition: 0.3s; position: relative; }
        .book-card:hover { transform: translateY(-10px); border-color: var(--main-gold); }
        .book-icon { font-size: 45px; color: var(--main-gold); margin-bottom: 15px; display: block; }
        .btn-open { background-color: var(--dark-blue); color: white; text-decoration: none; padding: 10px 25px; border-radius: 5px; display: inline-block; font-weight: bold; margin-top: 15px; }
        footer { text-align: center; padding: 30px; color: #777; }
    </style>
</head>
<body>

<header>
    <span class="logo-symbol">⚜️</span>
    <h1>منصة أبو محمد العبيدي</h1>
    <p>الحقيبة التدريبية والمصادر التعليمية</p>
</header>

<div class="container">
    <center><div class="status-badge" id="status">جاري فحص المكتبة...</div></center>
    <div class="books-grid" id="booksGrid"></div>
</div>

<footer>جميع الحقوق محفوظة &copy; ٢٠٢٦ - الأستاذ أبو محمد العبيدي</footer>

<script>
    // البيانات المستخرجة من الصورة الخاصة بك
    const GITHUB_USER = "waseemmonasar12"; 
    const REPO_NAME = "For-whatsapp-";
    const FOLDER_NAME = "books"; 

    async function loadBooks() {
        const grid = document.getElementById('booksGrid');
        const status = document.getElementById('status');
        try {
            const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${FOLDER_NAME}`);
            const data = await response.json();
            
            if (!Array.isArray(data)) {
                status.innerText = "يرجى إنشاء مجلد باسم books ورفع الكتب داخله";
                return;
            }

            grid.innerHTML = '';
            const pdfs = data.filter(file => file.name.endsWith('.pdf'));

            if (pdfs.length === 0) {
                status.innerText = "المجلد موجود ولكن لا توجد ملفات PDF حالياً.";
                return;
            }

            pdfs.forEach(file => {
                const cleanName = file.name.replace('.pdf', '').replace(/[-_]/g, ' ');
                const card = document.createElement('div');
                card.className = 'book-card';
                card.innerHTML = `
                    <span class="book-icon">📜</span>
                    <div style="font-weight:bold;">${cleanName}</div>
                    <a href="${file.download_url}" class="btn-open" target="_blank">قراءة الملف</a>
                `;
                grid.appendChild(card);
            });
            status.innerText = `تم تحديث المكتبة بنجاح (${pdfs.length} ملف)`;
        } catch (e) {
            status.innerText = "خطأ: تأكد من اسم المستخدم والمستودع";
        }
    }
    window.onload = loadBooks;
</script>
</body>
</html>
