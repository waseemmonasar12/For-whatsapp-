<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أبو محمد العبيدي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --navy: #0f172a;
            --bg: #f1f5f9;
        }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; color: var(--navy); }
        header { background: var(--navy); color: white; padding: 60px 20px; text-align: center; border-bottom: 5px solid var(--gold); }
        .logo { font-size: 60px; margin-bottom: 15px; display: block; }
        .container { max-width: 1100px; margin: -40px auto 50px auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        /* تنسيق عداد الزوار */
        .visitor-counter {
            background: var(--navy);
            color: var(--gold);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            margin-top: 10px;
            border: 1px solid var(--gold);
        }

        .status-msg { text-align: center; padding: 10px; background: #f8fafc; border-radius: 10px; margin-bottom: 30px; border: 1px solid #e2e8f0; font-size: 0.9rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .card { background: white; border: 1px solid #eee; border-radius: 15px; padding: 25px; text-align: center; transition: 0.3s; border-right: 5px solid var(--gold); }
        .card:hover { transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .btn { display: inline-block; background: var(--navy); color: white; text-decoration: none; padding: 12px 25px; border-radius: 8px; margin-top: 20px; font-weight: bold; width: 85%; }
        .btn:hover { background: var(--gold); color: var(--navy); }
        footer { text-align: center; padding: 30px; color: #64748b; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <span class="logo">⚜️</span>
    <h1>منصة  أبو محمد العبيدي</h1>
    <p>الحقيبة التدريبية والمصادر التعليمية</p>
    <div class="visitor-counter">
        عدد الزيارات: <span id="count">...</span>
    </div>
</header>

<div class="container">
    <div class="status-msg" id="msg">انتظر قليلاً.. جاري فحص مكتبة الكتب</div>
    <div class="grid" id="bookGrid"></div>
</div>

<footer>
    جميع الحقوق محفوظة &copy; ٢٠٢٤ | تصميم منصة أبو محمد العبيدي
</footer>

<script>
    const USER = "waseemmonasar12"; 
    const REPO = "For-whatsapp-"; 
    const FOLDER = "books"; 

    // وظيفة جلب الكتب
    async function getBooks() {
        const grid = document.getElementById('bookGrid');
        const msg = document.getElementById('msg');
        
        try {
            const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER}`);
            const data = await response.json();

            if (!Array.isArray(data)) {
                msg.innerHTML = "⚠️ تأكد من إنشاء مجلد باسم <b>books</b> داخل المستودع ورفع الكتب فيه.";
                return;
            }

            const pdfs = data.filter(f => f.name.endsWith('.pdf'));
            grid.innerHTML = '';

            if (pdfs.length === 0) {
                msg.innerText = "المجلد موجود ولكن لا توجد ملفات PDF حالياً.";
                return;
            }

            pdfs.forEach(file => {
                const name = file.name.replace('.pdf', '').replace(/[-_]/g, ' ');
                grid.innerHTML += `
                    <div class="card">
                        <div style="font-size: 40px; margin-bottom:10px;">📕</div>
                        <div style="font-weight:bold; min-height:50px;">${name}</div>
                        <a href="${file.download_url}" class="btn" target="_blank">تحميل PDF</a>
                    </div>
                `;
            });

            msg.innerText = `تم العثور على ${pdfs.length} كتاب في مكتبتك`;
            msg.style.color = "green";

        } catch (e) {
            msg.innerText = "خطأ في الاتصال بالمستودع. تأكد من إعدادات الخصوصية.";
        }
    }

    // وظيفة عداد الزوار (تعمل تلقائياً عند فتح الصفحة)
    async function updateCounter() {
        try {
            // سنستخدم اسم مستخدمك واسم المستودع لإنشاء مفتاح فريد للعداد
            const response = await fetch(`https://api.countapi.xyz/hit/${USER}-${REPO}/visits`);
            const data = await response.json();
            document.getElementById('count').innerText = data.value;
        } catch (error) {
            // في حال تعطل خدمة العداد الخارجية لا يتوقف الموقع
            document.getElementById('count').innerText = "١"; 
        }
    }

    window.onload = function() {
        getBooks();
        updateCounter();
    };
</script>

</body>
</html>
